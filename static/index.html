<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC26 Pack Opener</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <header>
    <h1>⚽ FC26 PACK OPENER</h1>
    <span class="header-badge">LIVE</span>
  </header>

  <div class="main-layout">

    <!-- ===== PANNELLO CONFIGURAZIONE ===== -->
    <aside class="config-panel">

      <div class="config-section">
        <h3>Range Overall</h3>
        <div class="range-row">
          <div class="field-group">
            <label for="inp-ovr-min">Min OVR</label>
            <input type="number" id="inp-ovr-min" value="75" min="47" max="91" step="1">
          </div>
          <div class="field-group">
            <label for="inp-ovr-max">Max OVR</label>
            <input type="number" id="inp-ovr-max" value="82" min="47" max="91" step="1">
          </div>
        </div>

        <!-- Info distribuzione pesi -->
        <div style="font-size:0.7rem; color:var(--text2); background:var(--surface); border-radius:8px; padding:8px 10px; line-height:1.6;">
          ⚡ I giocatori con OVR più alto hanno priorità maggiore nell'estrazione.
        </div>
      </div>

      <div class="config-section">
        <h3>Pacchetto</h3>
        <div class="field-group">
          <label for="inp-num-cards">Numero di carte</label>
          <input type="number" id="inp-num-cards" value="5" min="1" max="20" step="1">
        </div>
        <div class="toggle-row">
          <span>Includi portieri</span>
          <label class="toggle">
            <input type="checkbox" id="tog-gk" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Pool disponibile -->
      <div class="config-section">
        <h3>Pool giocatori</h3>
        <div class="pool-info" id="pool-count">
          Calcolo...
        </div>
      </div>

      <button id="btn-open">🎁 APRI PACCHETTO</button>

    </aside>

    <!-- ===== AREA GIOCO ===== -->
    <main class="play-area" id="play-area">
      <div class="idle-state">
        <div class="pack-icon">🎁</div>
        <p>Configura il pacchetto e premi<br><strong>APRI PACCHETTO</strong> per iniziare</p>
      </div>
    </main>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
